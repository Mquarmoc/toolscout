<!DOCTYPE html>
<html>
<head>
    <title>TikTok Auth Callback</title>
    <style>
        body { font-family: system-ui; max-width: 600px; margin: 80px auto; padding: 0 20px; background: #1a1a2e; color: #eee; }
        .code-box { background: #16213e; padding: 16px; border-radius: 8px; font-family: monospace; word-break: break-all; font-size: 14px; margin: 16px 0; border: 1px solid #0f3460; }
        .copy-btn { background: #e94560; color: white; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; }
        .copy-btn:hover { background: #c81e45; }
        h1 { color: #e94560; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
    </style>
</head>
<body>
    <h1>🎬 TikTok Auth</h1>
    <div id="content">Loading...</div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');
        const el = document.getElementById('content');
        
        if (code) {
            el.innerHTML = `
                <p class="success">✅ Authorization successful!</p>
                <p>Copy this code and paste it in your terminal:</p>
                <div class="code-box" id="code">${code}</div>
                <button class="copy-btn" onclick="navigator.clipboard.writeText('${code}').then(() => this.textContent = 'Copied!')">
                    📋 Copy Code
                </button>
                <p style="margin-top: 24px; color: #888;">You can close this tab after copying.</p>
            `;
        } else if (error) {
            const desc = params.get('error_description') || error;
            el.innerHTML = `<p class="error">❌ Authorization failed: ${desc}</p>`;
        } else {
            el.innerHTML = '<p class="error">❌ No authorization code received.</p>';
        }
    </script>
</body>
</html>
